apiVersion: apps/v1
kind: Deployment
metadata:
  name: kondate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kondate
  template:
    metadata:
      labels:
        app: kondate
    spec:
      containers:
        - name: kondate
          image: ghcr.io/ShotaKitazawa/kondate:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_PATH
              value: /data/app.db
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: kondate-oidc
                  key: issuer
            - name: OIDC_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: kondate-oidc
                  key: audience
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kondate-oidc
                  key: client_id
            - name: OIDC_ALLOWED_SUBS
              valueFrom:
                secretKeyRef:
                  name: kondate-oidc
                  key: allowed_subs
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
