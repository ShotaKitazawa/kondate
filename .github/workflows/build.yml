name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract versions from mise.toml
        id: mise-versions
        run: |
          echo "node=$(grep -oP '^node\s*=\s*"\K[^"]+' mise.toml)" >> "$GITHUB_OUTPUT"
          echo "go=$(grep -oP '^go\s*=\s*"\K[^"]+' mise.toml)" >> "$GITHUB_OUTPUT"
          echo "pnpm=$(grep -oP '^pnpm\s*=\s*"\K[^"]+' mise.toml)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=branch,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ steps.mise-versions.outputs.node }}
            GO_VERSION=${{ steps.mise-versions.outputs.go }}
            PNPM_VERSION=${{ steps.mise-versions.outputs.pnpm }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
