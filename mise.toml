[tools]
go = "1.26"
golangci-lint = "latest"
node = "24"
pnpm = "10"
air = "latest"

[tasks.dev]
run = "mise run dev-backend & mise run dev-frontend & wait"

[tasks.dev-backend]
dir = "{{config_root}}/backend"
env = { DB_PATH = "{{config_root}}/backend/tmp/app.db", ADDR = "127.0.0.1:8080" }
run = "air -- --disable-oidc"

[tasks.dev-frontend]
dir = "{{config_root}}/frontend"
run = "pnpm dev"

[tasks.generate]
depends = ["generate-backend", "generate-frontend"]

[tasks.generate-backend]
dir = "{{config_root}}/backend"
run = "go generate ./..."

[tasks.generate-frontend]
depends = ["generate-icons"]
dir = "{{config_root}}/frontend"
run = "pnpm run openapi-ts"

[tasks.generate-icons]
dir = "{{config_root}}/frontend"
run = "pnpm run generate-icons"

[tasks.format]
depends = ["format-backend", "format-frontend"]

[tasks.format-backend]
dir = "{{config_root}}/backend"
run = "gofmt -w ."

[tasks.format-frontend]
dir = "{{config_root}}/frontend"
run = "pnpm run format"

[tasks.test-backend]
dir = "{{config_root}}/backend"
run = "go test -v ./..."

[tasks.test-frontend]
dir = "{{config_root}}/frontend"
run = "pnpm run test"

[tasks.frontend-sync]
run = "node {{config_root}}/scripts/sync-frontend.ts"

[tasks.ci]
depends = [
  "ci-build-backend",
  "ci-build-frontend",
  "ci-lint-backend",
  "ci-lint-frontend",
  "ci-test-backend",
  "ci-test-frontend",
  "ci-deps-backend",
  "frontend-sync",
]

[tasks.ci-build-backend]
dir = "{{config_root}}/backend"
run = "go build ./..."

[tasks.ci-build-frontend]
dir = "{{config_root}}/frontend"
run = "pnpm run build"

[tasks.ci-lint-backend]
dir = "{{config_root}}/backend"
run = "golangci-lint run"

[tasks.ci-lint-frontend]
dir = "{{config_root}}/frontend"
run = "pnpm run lint"

[tasks.ci-test-backend]
dir = "{{config_root}}/backend"
run = "go test -v ./..."

[tasks.ci-test-frontend]
dir = "{{config_root}}/frontend"
run = "pnpm run test"

[tasks.ci-deps-backend]
dir = "{{config_root}}/backend"
run = "node {{config_root}}/scripts/check_deps_age_backend.ts"

[tasks.pre-merge]
run = [
  "mise run generate",
  "mise run format",
  "mise run ci",
]
