<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Blue rounded square background -->
  <rect width="512" height="512" rx="108" fill="#5c6bc0"/>

  <!-- Chopstick pair: two parallel diagonal lines from upper area down to bowl -->
  <!-- Chopstick 1: tapered (thick top, thin tip) -->
  <polygon points="188,69 162,83 260,296 268,290" fill="white"/>
  <circle cx="175" cy="76" r="14" fill="white"/>
  <circle cx="264" cy="294" r="5" fill="white"/>

  <!-- Chopstick 2: tapered -->
  <polygon points="250,51 224,65 322,278 330,272" fill="white"/>
  <circle cx="237" cy="58" r="14" fill="white"/>
  <circle cx="326" cy="276" r="5" fill="white"/>

  <!-- Bowl rim (ellipse) -->
  <ellipse cx="256" cy="310" rx="200" ry="34" fill="white"/>

  <!-- Bowl body (U-curve) -->
  <path d="M56 310 C56 460 456 460 456 310 Z" fill="white"/>
</svg>
